<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJ Studio</title>
    <link rel="icon" href="thumbnail.png" type="image/png">

    <style>
        body {
            margin: 0;
            background: radial-gradient(circle at top, #141428, #05050a);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1 {
            margin-top: 20px;
            margin-bottom: 15px;
            font-size: 50px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            background: linear-gradient(90deg, #bf00ff, #ff00ff, #bf00ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(191, 0, 255, 0.7));
            animation: shine 4s linear infinite;
        }

        @keyframes shine { to { background-position: 200% center; } }

        .controls {
            margin-top: 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        input[type="file"] { display: none; }

        .file-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 18px;
            border-radius: 14px;
            background: rgba(27, 27, 51, 0.8);
            box-shadow: 0 0 15px rgba(191, 0, 255, 0.2);
            cursor: pointer;
            transition: 0.3s;
            min-width: 200px;
            justify-content: center;
            border: 1px solid rgba(191, 0, 255, 0.3);
            font-weight: bold;
        }

        .file-btn:hover {
            background: #bf00ff;
            box-shadow: 0 0 25px rgba(191, 0, 255, 0.5);
            transform: translateY(-2px);
        }

        canvas {
            margin-top: 20px;
            border-radius: 15px;
            background: #000;
            box-shadow: 0 0 40px rgba(191, 0, 255, 0.25);
            display: block;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .seek-container {
            width: 900px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 15px;
        }

        #seekBar {
            flex-grow: 1;
            cursor: pointer;
            accent-color: #bf00ff;
            height: 6px;
        }

        .time-display {
            font-size: 14px;
            color: #bf00ff;
            font-family: monospace;
            min-width: 50px;
        }

        .btn-container {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            width: 100%;
        }

        #toggleBtn {
            width: 180px;
            height: 55px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            background: linear-gradient(135deg, #1b1b33 0%, #3d1b4d 100%);
            color: white;
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(191, 0, 255, 0.4);
        }

        #toggleBtn:hover {
            background: #bf00ff;
            transform: scale(1.05);
        }

        .dj-panel {
            position: fixed;
            bottom: 20px;
            background: rgba(15, 15, 30, 0.9);
            padding: 20px 25px;
            border-radius: 25px;
            border: 1px solid rgba(191, 0, 255, 0.3);
            display: flex;
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
        }

        .dj-controls-panel { left: 30px; gap: 20px; }
        
        .performance-panel { 
            right: 30px; 
            flex-direction: column; 
            gap: 15px; 
            width: 175px; 
            align-items: stretch; 
            justify-content: center; 
        }

        .fader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .fader-wrapper {
            position: relative;
            width: 35px;
            height: 160px;
            background: #05050a;
            border-radius: 8px;
            border: 2px solid #2a1033;
            display: flex;
            justify-content: center;
            padding: 8px 0;
        }

        input[type="range"].vertical-fader {
            writing-mode: bt-lr;
            appearance: slider-vertical;
            width: 35px;
            height: 100%;
            cursor: pointer;
            background: transparent;
        }

        input[type="range"].vertical-fader::-webkit-slider-thumb {
            appearance: none;
            width: 42px;
            height: 20px;
            background: #bf00ff;
            border: 2px solid #fff;
            border-radius: 4px;
            box-shadow: 0 0 15px rgba(191, 0, 255, 0.8);
        }

        input[type="range"].vertical-fader::-moz-range-thumb {
            width: 42px;
            height: 20px;
            background: #bf00ff;
            border: 2px solid #fff;
            border-radius: 4px;
            box-shadow: 0 0 15px rgba(191, 0, 255, 0.8);
        }

        .fader-label {
            font-size: 9px;
            color: #bf00ff;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .fader-value {
            font-size: 12px;
            color: #fff;
            font-weight: bold;
            min-width: 45px;
            text-align: center;
        }

        .panel-btn {
            background: rgba(27, 27, 51, 0.8);
            border: 1px solid rgba(191, 0, 255, 0.4);
            color: white;
            padding: 13px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            transition: 0.2s;
            letter-spacing: 1.25px;
        }

        .panel-btn:hover { background: #bf00ff; border-color: white; }

        .switch-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 55px;
            height: 28px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .flip {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #1b1b33;
            transition: .4s;
            border-radius: 28px;
            border: 1px solid rgba(191, 0, 255, 0.4);
        }
        .flip:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 5px; bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .flip { background-color: #bf00ff; }
        input:checked + .flip:before { transform: translateX(26px); }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 12px 20px;
            border-radius: 12px;
            background: rgba(27, 27, 51, 0.9);
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            z-index: 10;
            transition: 0.3s;
            border: 1px solid rgba(191, 0, 255, 0.2);
        }

        .back-btn:hover { background: #bf00ff; }
    </style>
</head>
<body>

<a href="/" class="back-btn">⟵ Späť na portál</a>

<h1>DJ Studio</h1>

<div class="controls">
    <label class="file-btn">
        <span>📁</span>
        <span id="fileName">Vložiť súbor</span>
        <input type="file" id="audioFile" accept="audio/*">
    </label>
</div>

<canvas id="canvas" width="900" height="280"></canvas>

<div class="seek-container">
    <span id="currentTime" class="time-display">0:00</span>
    <input type="range" id="seekBar" value="0" step="1">
    <span id="durationTime" class="time-display">0:00</span>
</div>

<div class="btn-container">
    <button id="toggleBtn">
        <span class="icon">▶</span>
        <span id="btnText">Štart</span>
    </button>
</div>

<div class="dj-panel dj-controls-panel">
    <div class="fader-container">
        <span class="fader-label">VOL</span>
        <div class="fader-wrapper">
            <input type="range" id="volumeSlider" class="vertical-fader" min="0" max="1" step="0.01" value="0.5" orient="vertical">
        </div>
        <span id="volPercent" class="fader-value">50%</span>
    </div>
    <div class="fader-container">
        <span class="fader-label">FILTER</span>
        <div class="fader-wrapper">
            <input type="range" id="filterSlider" class="vertical-fader" min="-1" max="1" step="0.01" value="0" orient="vertical">
        </div>
        <span id="filterLabel" class="fader-value">OFF</span>
    </div>
    <div class="fader-container">
        <span class="fader-label">PITCH</span>
        <div class="fader-wrapper">
            <input type="range" id="pitchSlider" class="vertical-fader" min="0.25" max="5.0" step="0.01" value="1.0" orient="vertical">
        </div>
        <span id="pitchValue" class="fader-value">1.00x</span>
    </div>
    <div class="fader-container">
        <span class="fader-label">PAN</span>
        <div class="fader-wrapper">
            <input type="range" id="panSlider" class="vertical-fader" min="-1" max="1" step="0.01" value="0" orient="vertical">
        </div>
        <span id="panLabel" class="fader-value">MID</span>
    </div>
    <div class="fader-container">
        <span class="fader-label">VERB</span>
        <div class="fader-wrapper">
            <input type="range" id="reverbSlider" class="vertical-fader" min="0" max="1" step="0.01" value="0" orient="vertical">
        </div>
        <span id="reverbLabel" class="fader-value">0%</span>
    </div>
    <div class="fader-container">
        <span class="fader-label">DRIVE</span>
        <div class="fader-wrapper">
            <input type="range" id="driveSlider" class="vertical-fader" min="0" max="50" step="1" value="0" orient="vertical">
        </div>
        <span id="driveLabel" class="fader-value">0</span>
    </div>
</div>

<div class="dj-panel performance-panel">
    <span class="fader-label" style="text-align:center; margin-bottom: 5px;">FX Master</span>
    
    <div class="switch-wrap">
        <span class="fader-label">Loop</span>
        <label class="switch">
            <input type="checkbox" id="loopToggle">
            <span class="flip"></span>
        </label>
    </div>

    <button id="cueBtn" class="panel-btn">⏮ CUE (Reset Time)</button>

    <button id="resetFxBtn" class="panel-btn" style="color: #ff00ff; border-color: #ff00ff; margin-top: 10px;">Reset All FX</button>
</div>

<audio id="audio"></audio>

<script>
const audio = document.getElementById("audio");
const fileInput = document.getElementById("audioFile");
const toggleBtn = document.getElementById("toggleBtn");
const btnText = document.getElementById("btnText");
const cueBtn = document.getElementById("cueBtn");
const loopToggle = document.getElementById("loopToggle");
const resetFxBtn = document.getElementById("resetFxBtn");

const volumeSlider = document.getElementById("volumeSlider");
const volPercent = document.getElementById("volPercent");
const pitchSlider = document.getElementById("pitchSlider");
const pitchValue = document.getElementById("pitchValue");
const filterSlider = document.getElementById("filterSlider");
const filterLabel = document.getElementById("filterLabel");
const panSlider = document.getElementById("panSlider");
const panLabel = document.getElementById("panLabel");
const reverbSlider = document.getElementById("reverbSlider");
const reverbLabel = document.getElementById("reverbLabel");
const driveSlider = document.getElementById("driveSlider");
const driveLabel = document.getElementById("driveLabel");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const seekBar = document.getElementById("seekBar");
const currentTimeEl = document.getElementById("currentTime");
const durationTimeEl = document.getElementById("durationTime");

const AudioContext = window.AudioContext || window.webkitAudioContext;
const audioCtx = new AudioContext();
const analyser = audioCtx.createAnalyser();
const filterNode = audioCtx.createBiquadFilter();
const panNode = audioCtx.createStereoPanner();
const driveNode = audioCtx.createWaveShaper();
const dryNode = audioCtx.createGain();
const wetNode = audioCtx.createGain();

filterNode.type = "allpass";
panNode.pan.value = 0;
dryNode.gain.value = 1.0;
wetNode.gain.value = 0.0;
driveNode.curve = null;

analyser.fftSize = 256;
const bufferLength = analyser.frequencyBinCount;
const dataArray = new Uint8Array(bufferLength);

let source;
let isPlaying = false;
let isDraggingSeek = false;
let fileLoaded = false; // PRIDANÉ: sledovanie či je súbor načítaný

function checkFile() {
    if (!fileLoaded) {
        alert("Najprv musíš vybrať hudobný súbor! 📁");
        return false;
    }
    return true;
}

function makeDistortionCurve(amount) {
    let k = amount, n_samples = 44100, curve = new Float32Array(n_samples);
    for (let i = 0; i < n_samples; ++i ) {
        let x = i * 2 / n_samples - 1;
        curve[i] = (3 + k) * x * 20 * (Math.PI / 180) / (Math.PI + k * Math.abs(x));
    }
    return curve;
}

window.addEventListener('load', () => {
    volumeSlider.value = 0.5; audio.volume = 0.5; volPercent.textContent = "50%";
    pitchSlider.value = 1.0; audio.playbackRate = 1.0; pitchValue.textContent = "1.00x";
    filterSlider.value = 0; filterLabel.textContent = "OFF";
    panSlider.value = 0; panLabel.textContent = "MID";
    reverbSlider.value = 0; reverbLabel.textContent = "0%";
    driveSlider.value = 0; driveLabel.textContent = "0";
    seekBar.value = 0; currentTimeEl.textContent = "0:00";
});

filterSlider.addEventListener("input", (e) => {
    if (!checkFile()) { e.target.value = 0; return; }
    const val = parseFloat(e.target.value);
    if (val > 0.05) { 
        filterNode.type = "highpass"; filterNode.frequency.value = val * 5000; filterLabel.textContent = "HPF"; 
    } else if (val < -0.05) { 
        filterNode.type = "lowpass"; filterNode.frequency.value = 20000 + (val * 19800); filterLabel.textContent = "LPF"; 
    } else { 
        filterNode.type = "allpass"; filterLabel.textContent = "OFF"; 
    }
});

panSlider.addEventListener("input", (e) => {
    if (!checkFile()) { e.target.value = 0; return; }
    const val = parseFloat(e.target.value);
    panNode.pan.value = val;
    panLabel.textContent = val > 0.1 ? "RIGHT" : val < -0.1 ? "LEFT" : "MID";
});

driveSlider.addEventListener("input", (e) => {
    if (!checkFile()) { e.target.value = 0; return; }
    const val = parseInt(e.target.value);
    driveNode.curve = val > 0 ? makeDistortionCurve(val) : null;
    driveLabel.textContent = val;
});

reverbSlider.addEventListener("input", (e) => {
    if (!checkFile()) { e.target.value = 0; return; }
    const val = parseFloat(e.target.value);
    wetNode.gain.value = val;
    dryNode.gain.value = 1 - val;
    reverbLabel.textContent = Math.round(val * 100) + "%";
});

volumeSlider.addEventListener("input", (e) => { 
    if (!checkFile()) { e.target.value = 0.5; return; }
    audio.volume = e.target.value; volPercent.textContent = Math.round(e.target.value * 100) + "%"; 
});

pitchSlider.addEventListener("input", (e) => { 
    if (!checkFile()) { e.target.value = 1.0; return; }
    audio.playbackRate = e.target.value; pitchValue.textContent = parseFloat(e.target.value).toFixed(2) + "x"; 
});

cueBtn.addEventListener("click", () => { 
    if (checkFile()) audio.currentTime = 0; 
});

loopToggle.addEventListener("change", () => {
    if (!checkFile()) { loopToggle.checked = false; return; }
    audio.loop = loopToggle.checked;
});

audio.addEventListener("ended", () => {
    if (!audio.loop) {
        isPlaying = false;
        btnText.textContent = "Štart";
        toggleBtn.querySelector(".icon").textContent = "▶";
    }
});

resetFxBtn.addEventListener("click", () => {
    if (!checkFile()) return;
    volumeSlider.value = 0.5; volumeSlider.dispatchEvent(new Event('input'));
    filterSlider.value = 0; filterSlider.dispatchEvent(new Event('input'));
    reverbSlider.value = 0; reverbSlider.dispatchEvent(new Event('input'));
    driveSlider.value = 0; driveSlider.dispatchEvent(new Event('input'));
    panSlider.value = 0; panSlider.dispatchEvent(new Event('input'));
    pitchSlider.value = 1.0; pitchSlider.dispatchEvent(new Event('input'));
    loopToggle.checked = false; audio.loop = false;
});

fileInput.addEventListener("change", function () {
    const file = this.files[0]; if (!file) return;
    fileLoaded = true; // OZNAČÍME, ŽE SÚBOR JE TU
    document.getElementById("fileName").textContent = file.name;
    audio.src = URL.createObjectURL(file);
    audio.load();

    if (source) source.disconnect();
    source = audioCtx.createMediaElementSource(audio);
    source.connect(driveNode);
    driveNode.connect(filterNode);
    filterNode.connect(panNode);
    panNode.connect(dryNode);
    panNode.connect(wetNode);
    dryNode.connect(analyser);
    wetNode.connect(analyser);
    analyser.connect(audioCtx.destination);
});

toggleBtn.addEventListener("click", async () => {
    if (!checkFile()) return;
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    
    const iconEl = toggleBtn.querySelector(".icon");

    if (!isPlaying) { 
        audio.play(); 
        isPlaying = true; 
        btnText.textContent = "Stop"; 
        iconEl.textContent = "■";
    } 
    else { 
        audio.pause(); 
        isPlaying = false; 
        btnText.textContent = "Štart"; 
        iconEl.textContent = "▶";
    }
});

function formatTime(s) { if(isNaN(s)) return "0:00"; let m=Math.floor(s/60), r=Math.floor(s%60); return m+":"+(r<10?"0":"")+r; }
audio.addEventListener("loadedmetadata", () => { seekBar.max = Math.floor(audio.duration); durationTimeEl.textContent = formatTime(audio.duration); });
audio.addEventListener("timeupdate", () => { if (!isDraggingSeek) { seekBar.value = Math.floor(audio.currentTime); currentTimeEl.textContent = formatTime(audio.currentTime); } });

seekBar.addEventListener("input", () => { 
    if (!checkFile()) { seekBar.value = 0; return; }
    isDraggingSeek = true; 
    currentTimeEl.textContent = formatTime(seekBar.value); 
});

seekBar.addEventListener("change", () => { 
    if (checkFile()) { audio.currentTime = seekBar.value; }
    isDraggingSeek = false; 
});

function draw() {
    requestAnimationFrame(draw);
    analyser.getByteFrequencyData(dataArray);
    ctx.fillStyle = "#000"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    const barWidth = (canvas.width / bufferLength) * 2; let x = 0;
    for (let i = 0; i < bufferLength; i++) {
        let barHeight = dataArray[i];
        ctx.fillStyle = `rgb(${barHeight + 100}, 0, 255)`;
        ctx.fillRect(x, canvas.height - (barHeight/255)*canvas.height, barWidth, (barHeight/255)*canvas.height);
        x += barWidth + 1;
    }
}
draw();
</script>
</body>
</html>
